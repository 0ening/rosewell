<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "PML", 'Songti TC', 'PMingLiU', '新細明體', 'Kaiti TC', serif;
            background-image: url('r.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: crosshair;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        
        .top-nav { position: absolute; top: 20px; width: 100%; max-width: 800px; display: flex; padding: 0 20px; z-index: 10; font-weight: bold; font-size: 1.1rem; }
        .nav-links { background-color: #ccffcc; border: 1px solid #99ff99; padding: 6px 15px; display: flex; align-items: center; }
        .nav-links a { color: #0077ff; text-decoration: underline; margin-right: 15px; cursor: pointer; }
        .nav-links a:hover { color: #00bfff; }

        .counter-box { position: relative; z-index: 2; background-color: rgba(255, 255, 255, 0.65); border: 2px dashed #990099; box-shadow: 8px 8px 0px #ccffcc; padding: 40px 25px; text-align: center; max-width: 400px; width: 85%; display: flex; flex-direction: column; align-items: center; }
        
        h2, .info-text { background-color: #ccffcc; border: 1px solid #99ff99; display: inline-block; padding: 6px 15px; margin-bottom: 5px; font-weight: bold; }
        
        .number-area { display: inline-block; background-color: #000000; border: 2px dashed #ccffcc; padding: 10px 25px; margin: 15px 0; box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.2); }
        .custom-number { font-size: 2.6rem; font-weight: bold; color: #ccffcc; letter-spacing: 5px; font-family: 'Courier New', monospace; text-shadow: 0px 0px 8px #ccffcc; }

        .text-link { display: inline-block; margin-top: 15px; font-size: 1.05rem; color: #000000; font-weight: bold; text-decoration: none; border-bottom: 1.5px solid #000000; background: transparent; cursor: pointer; padding: 2px 5px; }
        .text-link:hover { transform: scale(1.05); color: #990099; border-bottom: 1.5px dashed #990099; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: #fff; border: 2px dashed #990099; box-shadow: 6px 6px 0px #ccffcc; width: 85%; max-width: 350px; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; font-weight: bold; }
        .rules-title { font-weight: bold; color: #990099; margin-bottom: 15px; }
        .name-input { width: 100%; padding: 10px; border: 1px solid #000; margin-bottom: 15px; }
        .submit-btn { width: 100%; padding: 10px; background: transparent; border: 1.5px solid #990099; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-links">
            <a href="#">播放</a><a href="#">暫停</a><a href="#">取消</a><a href="index.html">回到主頁</a>
        </div>
    </div>

    <div class="counter-box">
        <h2>歡迎加入</h2><h2>有線耳機復活俱樂部</h2>
        <p class="info-text">您是第</p>
        <div class="number-area"><span id="member-id" class="custom-number">------</span></div>
        <p class="info-text">位會員</p>
        <div class="links-container">
            <a href="#" id="open-rules-btn" class="text-link">✟ 查看規則 ✟</a>
            <button id="download-trigger-btn" class="text-link" disabled>下載會員卡</button>
        </div>
    </div>

    <div id="rules-modal" class="modal-overlay"><div class="modal-content"><button id="close-rules-btn" class="close-btn">X</button><div class="rules-title">✦ 會員規則 ✦</div><ul class="rules-list"><li>需每天帶有線耳機出門。</li><li>擁有【有線耳機復活計畫】小卡。</li></ul></div></div>
    <div id="name-modal" class="modal-overlay"><div class="modal-content"><button id="close-name-btn" class="close-btn">X</button><div class="input-title">✦ 建立會員卡 ✦</div><input type="text" id="user-name-input" class="name-input" placeholder="輸入暱稱" maxlength="10"><button id="confirm-download-btn" class="submit-btn">確定產生</button></div></div>

    <script>
        const rulesModal = document.getElementById('rules-modal');
        const nameModal = document.getElementById('name-modal');
        const numberElement = document.getElementById('member-id');
        const downloadBtn = document.getElementById('download-trigger-btn');
        
        document.getElementById('open-rules-btn').onclick = (e) => { e.preventDefault(); rulesModal.style.display = 'flex'; };
        document.getElementById('close-rules-btn').onclick = () => rulesModal.style.display = 'none';
        document.getElementById('close-name-btn').onclick = () => nameModal.style.display = 'none';
        downloadBtn.onclick = () => nameModal.style.display = 'flex';

        // 簡單且穩定的計數動畫
        function startCounter() {
            const gasUrl = 'https://script.google.com/macros/s/AKfycbzJDHInkQ5G1_rzHGT2dRBbuJSJyJ0l485zbrEpuwWq60PIU983J9CVrwA1qd4pCPpSGg/exec';
            
            // 先讓它隨機跑
            let counter = 0;
            const interval = setInterval(() => {
                numberElement.innerText = Math.floor(Math.random() * 900000 + 100000);
            }, 100);

            fetch(gasUrl)
                .then(r => r.json())
                .then(d => {
                    clearInterval(interval);
                    numberElement.innerText = String(d.value).padStart(6, '0');
                    downloadBtn.disabled = false;
                })
                .catch(() => {
                    clearInterval(interval);
                    numberElement.innerText = "100001";
                    downloadBtn.disabled = false;
                });
        }
        startCounter();
    </script>
</body>
</html>
