<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有線耳機復活計畫 | 會員編號</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chinese-fonts/pml@1.0.1/dist/index.css">
    <style>
        body {
            font-family: "PML", 'PMingLiU', '新細明體', serif;
            background-image: url('r.jpg'); /* 沿用你好看的背景圖 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(2px) brightness(95%);
            -webkit-backdrop-filter: blur(2px) brightness(95%);
            background-color: rgba(244, 246, 248, 0.4);
            z-index: 1;
        }
        .counter-box {
            position: relative;
            z-index: 2;
            background-color: #99ffcc; /* 沿用你最愛的薄荷綠 */
            border: 1px solid #55cc99;
            border-radius: 4px; /* 無名小站方塊感 */
            padding: 40px 30px;
            text-align: center;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 80%;
        }
        h2 {
            font-size: 1.3rem;
            color: #000000;
            margin-bottom: 20px;
        }
        /* 號碼外框樣式 */
        .number-area {
            display: inline-block;
            background: #000000; /* 黑底框 */
            border: 1px dashed #ffffff;
            padding: 12px 24px;
            margin: 10px 0;
            box-shadow: inset 0 0 10px rgba(204, 102, 255, 0.5);
        }
        /* 💡 自建的幸運發光文字編號 */
        .custom-number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #00ffcc; /* 薄荷綠電子數字顏色 */
            letter-spacing: 3px;
            font-family: monospace, serif; /* 強制讓數字等寬，更有電子感 */
            text-shadow: 0px 0px 8px #00ffcc, 0px 0px 3px #ffffff;
        }
    </style>
</head>
<body>

    <div class="counter-box">
        <h2>🎧 有線耳機復活計畫 🎧</h2>
        <p style="color: #1e293b; margin-bottom: 10px;">恭喜你成為復活計畫的一員！</p>
        <p style="color: #1e293b; margin-bottom: 20px; font-size: 1.1rem;">您的專屬會員編號為</p>
        
        <div class="number-area">
            <span id="member-id" class="custom-number">NO.00000</span>
        </div>
        
        <p style="color: #64748b; margin-top: 20px; font-size: 0.85rem;">★ 專屬計畫編號，請截圖保存 ★</p>
    </div>

    <script>
        function generateMemberID() {
            // 利用當前時間的毫秒數當作種子，計算出一個 120 到 999 之間的隨機流水號
            const now = new Date();
            const seed = now.getTime() % 880 + 120; 
            
            // 格式化成 NO.00XXX 的帥氣樣式
            document.getElementById('member-id').innerText = 'NO.00' + seed;
        }
        // 網頁一打開立刻執行
        generateMemberID();
    </script>

</body>
</html>
